name: Build executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Default to read-only at the top level — Scorecard's Token-Permissions
# rule wants the minimal posture. The `release` job below opts back
# into `contents: write` so it can create the GitHub Release.
permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30 # PyInstaller occasionally hangs on macOS — bound the bill.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: disag-linux-x64
          - os: macos-latest
            artifact_name: disag-macos-arm64
          - os: windows-latest
            artifact_name: disag-windows-x64

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install Tk on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk tk-dev

      - name: Install PyInstaller
        # Hash-pinned via packaging/build-requirements.txt for Scorecard's
        # PinnedDependencies rule (the lower-tier version-pin form left
        # us at score 9/10; --require-hashes is the 10/10 form). The
        # .in source has the human-readable version constraints; the
        # .txt is the pip-compile output and is the one pip consumes.
        # Regenerate with: pip-compile --generate-hashes --allow-unsafe
        #   --strip-extras packaging/build-requirements.in
        run: python -m pip install --require-hashes -r packaging/build-requirements.txt

      - name: Build executables
        run: python packaging/build.py --clean

      - name: Smoke-test binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          ./dist/disag --help
          ./dist/exceed --help

      - name: Smoke-test binaries (Windows)
        if: runner.os == 'Windows'
        run: |
          .\dist\disag.exe --help
          .\dist\exceed.exe --help

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "artifacts/${{ matrix.artifact_name }}.zip" ./dist/disag.exe ./dist/exceed.exe README.md docs/
          else
            # -z is not valid in -r (append) mode on GNU tar or bsdtar, so
            # emit the binaries and the docs in a single -c invocation,
            # switching the working directory with repeated -C.
            tar -czf "artifacts/${{ matrix.artifact_name }}.tar.gz" \
              -C dist disag exceed \
              -C "$GITHUB_WORKSPACE" README.md docs
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/*

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    # softprops/action-gh-release needs `contents: write` to create
    # the release object. Scoped to this job only.
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: artifacts/*
          generate_release_notes: true
