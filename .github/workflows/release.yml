name: Build executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Default to read-only at the top level — Scorecard's Token-Permissions
# rule wants the minimal posture. The `release` job below opts back
# into `contents: write` so it can create the GitHub Release.
permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: disag-linux-x64
          - os: macos-latest
            artifact_name: disag-macos-arm64
          - os: windows-latest
            artifact_name: disag-windows-x64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install Tk on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk tk-dev

      - name: Install PyInstaller
        # Versions pinned for Scorecard's PinnedDependencies rule. Bump
        # when CVEs or new platform support land. pip itself is pinned
        # too so a future pip release that changes resolution behaviour
        # can't quietly break the build.
        run: python -m pip install pip==26.1.1 pyinstaller==6.20.0

      - name: Build executables
        run: python packaging/build.py --clean

      - name: Smoke-test binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          ./dist/disag --help
          ./dist/exceed --help

      - name: Smoke-test binaries (Windows)
        if: runner.os == 'Windows'
        run: |
          .\dist\disag.exe --help
          .\dist\exceed.exe --help

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "artifacts/${{ matrix.artifact_name }}.zip" ./dist/disag.exe ./dist/exceed.exe README.md docs/
          else
            # -z is not valid in -r (append) mode on GNU tar or bsdtar, so
            # emit the binaries and the docs in a single -c invocation,
            # switching the working directory with repeated -C.
            tar -czf "artifacts/${{ matrix.artifact_name }}.tar.gz" \
              -C dist disag exceed \
              -C "$GITHUB_WORKSPACE" README.md docs
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/*

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    # softprops/action-gh-release needs `contents: write` to create
    # the release object. Scoped to this job only.
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: artifacts/*
          generate_release_notes: true
