name: labeler

# Auto-label PRs based on changed file paths. Config lives in
# .github/labeler.yml — add or remove label sections there, not here.
#
# This is a quality-of-life workflow: makes PR filtering easier and gives
# the reviewer instant context about what areas a PR touches. Labels are
# additive — they don't block merging.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions: read-all

jobs:
  label:
    name: apply path-based labels
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      # `pull-requests: write` needed to attach labels to the PR.
      pull-requests: write
    # ── DO NOT add additional steps to this job ──────────────────────
    # This workflow runs on `pull_request_target` with `pull-requests:
    # write`, which means the job inherits a token that can mutate the
    # PR — but it executes in the context of the BASE branch, so it
    # does NOT check out PR-head code (actions/labeler reads file
    # paths via the API, not via a checkout). Adding any step that
    # checks out the PR head, runs scripts from the PR, or evaluates
    # PR-supplied inputs would create a privilege-escalation path
    # (untrusted-checkout in trusted context). If you need to do
    # more, split it into a separate `pull_request`-triggered
    # workflow that runs without write permissions.
    # ─────────────────────────────────────────────────────────────────
    steps:
      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true
          configuration-path: .github/labeler.yml
