name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

# Top-level read-all per Scorecard Token-Permissions guidance — the
# claude job below requests the elevated scopes it actually needs.
# Any future job added to this workflow inherits the read-only
# default unless it explicitly opts into more.
permissions: read-all

jobs:
  claude:
    # Authorisation gate. Both conditions must hold:
    #   1. CLAUDE_AUTHORIZED_USER is set as a repo variable (vars.* is empty
    #      string when unset → comparison fails closed).
    #   2. github.actor matches that variable.
    # If you ever rotate operators, update the variable in
    # Settings → Secrets and variables → Actions → Variables.
    if: |
      vars.CLAUDE_AUTHORIZED_USER != '' &&
      github.actor == vars.CLAUDE_AUTHORIZED_USER && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.assignees.*.login, 'claude')))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      # Defense in depth — if the if: gate above is ever removed by mistake,
      # this hard-fail prevents the job from progressing past authorisation.
      - name: Verify authorised actor
        env:
          AUTHORISED: ${{ vars.CLAUDE_AUTHORIZED_USER }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ -z "$AUTHORISED" ]; then
            echo "::error::CLAUDE_AUTHORIZED_USER repo variable is not set." >&2
            exit 1
          fi
          if [ "$ACTOR" != "$AUTHORISED" ]; then
            echo "::error::Actor '$ACTOR' is not the authorised Claude operator." >&2
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      # Bash allowlist is deliberately tight. Broad patterns like
      # `Bash(pnpm *)` would allow `pnpm exec <arbitrary-binary>`;
      # `Bash(gh *)` would allow `gh release create` (triggers production
      # deploys), `gh secret set`, `gh workflow run`, etc.; `Bash(git *)`
      # would allow `git push --force`. Each command below is read-only or
      # scoped to repo-local development tasks.
      #
      # Deliberately excluded: pnpm dev/dev:* (long-running), pnpm tf:* +
      # pnpm deploy* (real AWS), pnpm sops:* (KMS access). Use the canonical
      # check / build / e2e scripts that exist in package.json.
      - name: Run Claude Code
        uses: anthropics/claude-code-action@d5726de019ec4498aa667642bc3a80fca83aa102 # v1.0.148
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--max-turns 40 --allowedTools 'Read,Write,Edit,Glob,Grep,Bash(pnpm install --frozen-lockfile),Bash(pnpm check),Bash(pnpm check:*),Bash(pnpm build),Bash(pnpm build:*),Bash(pnpm e2e),Bash(pnpm e2e:*),Bash(pnpm format),Bash(pnpm preview:web),Bash(python3 -m unittest:*),Bash(python3 -m disag:*),Bash(python3 -m disag.convert:*),Bash(python3 -m exceed:*),Bash(git log:*),Bash(git diff:*),Bash(git status),Bash(git show:*),Bash(git blame:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh pr diff:*),Bash(gh issue view:*),Bash(gh issue list:*),Bash(gh run view:*),Bash(gh run list:*)'"
