name: Web CI

# Lint + typecheck + build the SvelteKit frontend, and fmt + validate
# the Terraform. Only runs when the web/ tree changes (the existing
# `tests.yml` covers the Python packages).
#
# All third-party actions are SHA-pinned with a trailing version
# comment per OpenSSF Scorecard's Pinned-Dependencies rule. Dependabot
# (`.github/dependabot.yml`, `actions` group) keeps the SHAs current
# — bump the comment alongside the SHA when reviewing those PRs.

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (SvelteKit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        # No `version:` here — the `packageManager` field in the root
        # package.json is the source of truth; Corepack honours it.
        # Pin must be v6+: v4 runs on Node 20 and can't install
        # pnpm@11.1.2 (which requires Node >= 22.13).
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:web
      - run: pnpm build:web

  e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # The Playwright base image ships browsers + system deps preinstalled
    # so `playwright install` becomes a no-op and we don't pay for OS
    # package downloads on every run. Pin to the same version as the
    # @playwright/test devDep — drift causes hard-to-diagnose failures.
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm e2e
        env:
          # Quiet the warning about HOME being set to /github/home in the
          # container — Playwright writes browser caches to ~/.cache.
          HOME: /root
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: failure()
        with:
          name: playwright-report
          path: web/frontend/playwright-report/
          retention-days: 7

  e2e-integration:
    name: Frontend E2E integration (real backend)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Same Playwright base image as the mocked job, plus python3 and
    # venv so local_server.py can boot the on-disk S3 stub and run real
    # disag/exceed code against the committed examples/ fixtures.
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'
      - run: pnpm install --frozen-lockfile
      - run: pnpm setup:py
      - run: pnpm e2e:integration
        env:
          HOME: /root
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: failure()
        with:
          name: playwright-integration-report
          path: web/frontend/playwright-report/
          retention-days: 7

  backend:
    name: Backend (Lambda zip build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'
      # Smoke check: the handler module imports correctly when the
      # disag/exceed packages are on sys.path. boto3 isn't installed in
      # CI, so stub it so the import line doesn't fail.
      - name: Stub boto3 + import handler
        env:
          INPUTS_BUCKET: ci-stub
          OUTPUTS_BUCKET: ci-stub
        run: |
          mkdir -p .stubs
          cat > .stubs/boto3.py <<'PY'
          def client(*_a, **_k):
              raise RuntimeError('boto3 stub — runtime only')
          PY
          PYTHONPATH=".:.stubs" python3 -c "import web.backend.handler"
      - name: Build Lambda zip
        run: bash web/backend/build.sh
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: lambda-zip
          path: web/backend/lambda.zip
          retention-days: 7

  terraform:
    name: Terraform (fmt + validate)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web/infra
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: '1.15.3'
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate
