name: Security

# Static analysis. CodeQL on every push to main, PRs that touch code
# (docs-only PRs skipped), and weekly to catch CVEs disclosed since
# the last commit. Findings flow to the GitHub Security tab via SARIF.
#
# Adapted from project-running/.github/workflows/security.yml for
# this repo's much smaller surface:
#   - python covers disag/, exceed/, tests/, web/backend/
#   - javascript-typescript covers web/frontend/ (SvelteKit + TS)
#   - actions covers every workflow under .github/workflows/
#
# What's not covered:
#   - Trivy / container scanning — there's no Dockerfile in this repo.
#     If a Lambda container image gets added later, port the Trivy job
#     from project-running/workflows/security.yml.
#
# All actions SHA-pinned with a trailing version comment — same
# discipline as project-running.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  schedule:
    - cron: '0 6 * * 1'

# Top-level minimal grant — Scorecard's Token-Permissions rule wants
# elevated permissions (security-events: write, actions: read) at the
# job level only, so a future job added here doesn't silently inherit
# them.
permissions:
  contents: read

jobs:
  codeql-python:
    name: CodeQL (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'
      - uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          languages: python
      - uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          category: '/language:python'

  codeql-javascript:
    name: CodeQL (TypeScript/JavaScript)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
      - uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          category: '/language:javascript-typescript'

  codeql-actions:
    name: CodeQL (GitHub Actions)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          languages: actions
      - uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          category: '/language:actions'
