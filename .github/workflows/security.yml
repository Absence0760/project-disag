name: Security

# Static analysis. CodeQL on every push to main, PRs that touch code
# (docs-only PRs skipped), and weekly to catch CVEs disclosed since
# the last commit. Findings flow to the GitHub Security tab via SARIF.
#
# Adapted from project-running/.github/workflows/security.yml for
# this repo's much smaller surface:
#   - python covers disag/, exceed/, tests/, web/backend/
#   - javascript-typescript covers web/frontend/ (SvelteKit + TS)
#   - actions covers every workflow under .github/workflows/
#
# What's not covered:
#   - Trivy / container scanning — there's no Dockerfile in this repo.
#     If a Lambda container image gets added later, port the Trivy job
#     from project-running/workflows/security.yml.
#
# All actions SHA-pinned with a trailing version comment — same
# discipline as project-running.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codeql-python:
    name: CodeQL (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v6.2.0
        with:
          python-version: '3.14'
      - uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        with:
          languages: python
      - uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        with:
          category: '/language:python'

  codeql-javascript:
    name: CodeQL (TypeScript/JavaScript)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v6.4.0
        with:
          node-version: '24'
      - uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        with:
          category: '/language:javascript-typescript'

  codeql-actions:
    name: CodeQL (GitHub Actions)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        with:
          languages: actions
      - uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        with:
          category: '/language:actions'
