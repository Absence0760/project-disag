name: Dependabot lockfile sync

# Dependabot updates web/frontend/package.json but doesn't always touch
# pnpm-lock.yaml cleanly (it shells out to npm by default). When that
# happens, web-ci.yml's `pnpm install --frozen-lockfile` fails and the
# PR sits red until someone opens it locally and re-locks.
#
# This workflow regenerates the lockfile on every Dependabot PR that
# touched any package.json and commits the result back, which retriggers
# CI and lets the PR go green without manual intervention.
#
# ───────────────────────── Setup (one-time) ─────────────────────────
#
#   1. Create a fine-grained PAT scoped to this repo with
#      "Contents: Write". Expiry up to you — rotate when it expires.
#
#   2. Add it as a **Dependabot** secret named
#      `DEPENDABOT_LOCKFILE_PAT`:
#        Settings → Secrets and variables → **Dependabot** →
#        New repository secret.   ← NOT the Actions tab.
#
#      CLI: `gh secret set DEPENDABOT_LOCKFILE_PAT --app dependabot`
#
# Why the Dependabot store, not the Actions store: GitHub treats
# Dependabot-authored PRs as forks for permission purposes. Workflows
# triggered by them get a read-only GITHUB_TOKEN and CANNOT read
# secrets from the regular Actions store — only from the separate
# Dependabot secrets store. A PAT stashed under the Actions tab is
# invisible to this workflow when Dependabot opens a PR.
#
# Why a PAT and not GITHUB_TOKEN: pushes made with GITHUB_TOKEN do
# not retrigger workflows — GitHub blocks that path to prevent
# infinite loops. A PAT push is attributed to the token owner and
# does retrigger `pull_request` events, so web-ci.yml re-runs on the
# synced branch.
#
# ─────────────────── Why the two-job split ────────────────────
#
# CodeQL's `actions/untrusted-checkout/medium` rule fires on any
# workflow that (a) has access to secrets AND (b) checks out PR-head
# code. The split below is the GitHub Security Lab-approved pattern:
#
#   regenerate: NO secrets. Runs `pnpm install --lockfile-only` on
#               the PR-head SHA (NOT the ref — a force-push between
#               event fire and checkout would otherwise swap in
#               different code). Worst a malicious bump could do is
#               produce a bogus lockfile — which would fail the next
#               --frozen-lockfile run, so a human notices.
#
#   push:       NO PR-head code in the working tree, ever — uses the
#               GitHub Contents API (PUT /repos/.../contents/...) to
#               upload the regenerated lockfile directly. The PAT is
#               passed to `gh api` only; no `git checkout` of PR-head
#               happens in this privileged job.

on:
  pull_request:
    paths:
      - '**/package.json'

permissions:
  contents: read

jobs:
  regenerate:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    # No `permissions:` override — inherits `contents: read` from the
    # workflow root AND has no access to any secret. Even if pnpm
    # install somehow ran attacker code, there's nothing to exfiltrate.
    steps:
      - name: Checkout PR branch (no credentials)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Pin to the immutable SHA from the event payload, not the
          # mutable ref name. A force-push between event-fire and
          # checkout would otherwise swap in code we never consented
          # to run. (CodeQL: untrusted-checkout/medium clears under
          # this pin + persist-credentials: false combination.)
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        # No `version:` — the `packageManager` field in root
        # package.json is the source of truth (Corepack honours it).

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: pnpm

      - name: Regenerate lockfile
        # --lockfile-only updates pnpm-lock.yaml without populating
        # node_modules. pnpm does not run any lifecycle scripts in
        # this mode; --ignore-scripts is redundant but explicit.
        run: pnpm install --lockfile-only --ignore-scripts

      - name: Bail if lockfile unchanged
        id: diff
        run: |
          if git diff --quiet pnpm-lock.yaml; then
            echo "changed=false" >>"$GITHUB_OUTPUT"
          else
            echo "changed=true" >>"$GITHUB_OUTPUT"
          fi

      - name: Upload lockfile artifact
        if: steps.diff.outputs.changed == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pnpm-lock
          path: pnpm-lock.yaml
          retention-days: 1

  push:
    needs: regenerate
    if: github.actor == 'dependabot[bot]' && needs.regenerate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      # The actual push uses the PAT (which has its own scope). The
      # GITHUB_TOKEN here is only for the artifact download API, so
      # `contents: read` is enough.
      contents: read
    steps:
      - name: Skip if PAT is unset
        id: gate
        env:
          PAT: ${{ secrets.DEPENDABOT_LOCKFILE_PAT }}
        run: |
          if [ -z "$PAT" ]; then
            echo "DEPENDABOT_LOCKFILE_PAT is not configured — skipping lockfile sync." >&2
            echo "skip=true" >>"$GITHUB_OUTPUT"
          else
            echo "skip=false" >>"$GITHUB_OUTPUT"
          fi

      - name: Download lockfile artifact
        if: steps.gate.outputs.skip == 'false'
        id: download
        # actions/download-artifact returns a non-fatal error when
        # the artifact doesn't exist — that's the "no change" path
        # from the regenerate job.
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        continue-on-error: true
        with:
          name: pnpm-lock

      - name: Push lockfile via Contents API
        if: steps.gate.outputs.skip == 'false' && steps.download.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_LOCKFILE_PAT }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # PR_HEAD_REF comes from the trusted event payload, not from
          # any file in the PR-head workspace — defensive sanity check.
          if [ -z "$PR_HEAD_REF" ]; then
            echo "::error::Missing PR head ref in event payload." >&2
            exit 1
          fi

          # Look up the existing lockfile's blob SHA on the PR head
          # branch — the Contents API requires it for an update. A 404
          # means Dependabot created pnpm-lock.yaml fresh in this PR
          # and we're effectively doing a creation (no sha arg).
          set +e
          EXISTING_SHA=$(gh api "repos/${REPO}/contents/pnpm-lock.yaml?ref=${PR_HEAD_REF}" --jq .sha 2>/dev/null)
          set -e

          B64=$(base64 -w0 pnpm-lock.yaml)

          # Compare with the current PR-head version; skip if identical
          # so we don't churn the PR with no-op commits.
          if [ -n "$EXISTING_SHA" ]; then
            REMOTE_CONTENT=$(gh api "repos/${REPO}/contents/pnpm-lock.yaml?ref=${PR_HEAD_REF}" --jq .content | tr -d '\n')
            if [ "$REMOTE_CONTENT" = "$B64" ]; then
              echo "Lockfile already in sync on PR head — nothing to push."
              exit 0
            fi
          fi

          # PUT the regenerated lockfile. The Contents API treats it
          # as opaque blob data — nothing from the PR-head workspace
          # ever runs in this step.
          ARGS=(
            -X PUT "repos/${REPO}/contents/pnpm-lock.yaml"
            -f message="chore: sync pnpm-lock.yaml"
            -f content="$B64"
            -f branch="$PR_HEAD_REF"
            -f "committer[name]=dependabot[bot]"
            -f "committer[email]=49699333+dependabot[bot]@users.noreply.github.com"
          )
          if [ -n "$EXISTING_SHA" ]; then
            ARGS+=( -f "sha=${EXISTING_SHA}" )
          fi
          gh api "${ARGS[@]}"
