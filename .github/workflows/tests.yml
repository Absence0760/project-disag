name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancel in-progress runs of the same workflow on the same ref.  Saves CI
# time when multiple commits land in quick succession.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal top-level grant per OpenSSF Scorecard's Token-Permissions rule.
# Each job inherits this; if a future job needs to write something
# (releases, packages, comments), opt in at the job level.
permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Project policy: Python ≥ 3.14 (CLAUDE.md). 3.14 matches the
        # deployed Lambda runtime; 3.13 is kept as the only older line
        # still on python.org's security-fix list, which catches the
        # occasional 3.14-only-feature regression before users hit it.
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit + e2e tests
        run: python -m unittest discover tests -v

      - name: Verify demo generators are deterministic
        # Re-run every generator and assert no committed file changed.
        # Catches accidental drift between generate.py and the data/
        # snapshot.
        run: |
          for demo in examples/method*_demo; do
            if [ -f "$demo/generate.py" ]; then
              echo "::group::regenerating $demo"
              python3 "$demo/generate.py"
              echo "::endgroup::"
            fi
          done
          if ! git diff --exit-code; then
            echo
            echo "::error::Demo data files differ from committed snapshot."
            echo "If this is intentional, run the generators locally and commit the result."
            exit 1
          fi
