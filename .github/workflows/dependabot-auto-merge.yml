name: Dependabot auto-merge

# Auto-squash minor + patch Dependabot PRs once CI is green. With four
# ecosystems (pip, npm, terraform, github-actions) opening a few PRs
# per week, the alternative is constant manual rubber-stamping.
#
# Major bumps stay manual — they're where breaks actually live.
#
# Requires: Settings → General → Pull Requests → "Allow auto-merge"
# enabled. Without it `gh pr merge --auto` no-ops; PRs sit waiting for
# a human like before (degenerate, not destructive).

on:
  pull_request_target:
    branches: [main]

permissions:
  contents: read

jobs:
  auto-merge:
    name: Auto-merge minor + patch
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
      # Note: PRs that modify files under .github/workflows/ cannot be
      # merged with the default GITHUB_TOKEN. The merge API rejects
      # them with "refusing to allow a GitHub App to create or update
      # workflow ... without `workflows` permission" — and this scope
      # is NOT something you can grant via `permissions:`. The only
      # routes are (a) a fine-grained PAT with the Workflows scope
      # passed via `gh auth login --with-token`, or (b) a GitHub App
      # installation. For now those PRs require a one-line manual
      # merge. The action-group dependabot config (#workflows ecosystem)
      # is the main source of these.
    steps:
      - name: Read dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve + auto-merge minor / patch
        if: steps.meta.outputs.update-type == 'version-update:semver-minor' || steps.meta.outputs.update-type == 'version-update:semver-patch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # PRs that modify workflow files (.github/workflows/**) can't
          # be merged with the default GITHUB_TOKEN — see the comment
          # block at the top of this file. Detect and skip with a
          # human-readable note so the run shows green; the maintainer
          # then merges manually.
          TOUCHED_WORKFLOW=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/files" \
            --jq '[.[] | select(.filename | startswith(".github/workflows/"))] | length')
          if [ "$TOUCHED_WORKFLOW" -gt 0 ]; then
            echo "::notice::PR touches $TOUCHED_WORKFLOW workflow file(s) — auto-merge skipped (GITHUB_TOKEN lacks the workflows scope). Merge manually."
            exit 0
          fi

          # NOTE — the audit flagged that approval is logged before CI
          # passes. The clean fix (gate on `gh pr checks --watch`)
          # would deadlock because this workflow's own job is itself a
          # PR check that the watch would wait on. The honest answer
          # is to move approval into a separate `workflow_run`-
          # triggered workflow keyed off the other CI's success;
          # for now we accept the trade-off — `--auto` still gates the
          # actual merge on any required status checks branch
          # protection enforces.
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
