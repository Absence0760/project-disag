# sops creation rules. Pick the first rule whose path_regex matches.
#
# All web/infra/*.enc.yaml files are encrypted with the project KMS
# key. The AWS profile used to encrypt/decrypt must already be
# SSO-logged-in (aws sso login --profile <profile>); see web/README.md
# for the full flow.
#
# To wire a new account / key:
#   1. Run ~/repos/templates/scripts/new-project-account.sh disag — this
#      creates the AWS account, the KMS key, and prints the `sops_kms_arn`
#      output (an ARN like arn:aws:kms:us-east-1:<acct>:key/<uuid>).
#   2. Replace `REPLACE_ME` below with that account ID (or paste the full
#      ARN in place of the whole `kms:` value).
#   3. Re-encrypt existing files: `sops updatekeys web/infra/<file>.enc.yaml`.

creation_rules:
  - path_regex: web/infra/.*\.enc\.yaml$
    # Replace with your KMS key ARN, e.g.
    # arn:aws:kms:us-east-1:111122223333:alias/disag-sops
    kms: arn:aws:kms:us-east-1:REPLACE_ME:alias/disag-sops
    encrypted_regex: "^(data|stringData|password|secret|token|key|.*_key|.*_secret)$"
